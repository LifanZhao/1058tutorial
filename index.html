<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期末复习资料</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #lock-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 48px 32px;
    background: #1a1d27;
    border: 1px solid #2a2d3d;
    border-radius: 16px;
    width: 360px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .lock-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  #lock-screen h1 { font-size: 20px; font-weight: 600; color: #f0f0f0; text-align: center; }
  #lock-screen p { font-size: 13px; color: #888; text-align: center; line-height: 1.6; }
  #pwd-input {
    width: 100%;
    padding: 12px 16px;
    background: #0f1117;
    border: 1px solid #2a2d3d;
    border-radius: 8px;
    color: #f0f0f0;
    font-size: 15px;
    letter-spacing: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  #pwd-input:focus { border-color: #6c63ff; }
  #pwd-input.error { border-color: #ef4444; animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  #unlock-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  #unlock-btn:hover { opacity: 0.9; }
  #unlock-btn:active { transform: scale(0.98); }
  #error-msg { font-size: 13px; color: #ef4444; display: none; }

  #viewer-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 48px 32px;
  }
  #viewer-screen h2 { font-size: 18px; font-weight: 600; color: #f0f0f0; }
  #viewer-screen p { font-size: 13px; color: #888; }
  .card-link {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 320px;
    padding: 20px 24px;
    background: #1a1d27;
    border: 1px solid #2a2d3d;
    border-radius: 12px;
    text-decoration: none;
    color: #e8e8e8;
    transition: border-color 0.2s, transform 0.1s;
  }
  .card-link:hover { border-color: #6c63ff; transform: translateY(-2px); }
  .card-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .blue { background: rgba(108,99,255,0.15); }
  .green { background: rgba(52,211,153,0.15); }
  .card-info { display: flex; flex-direction: column; gap: 4px; }
  .card-title { font-size: 15px; font-weight: 600; }
  .card-sub { font-size: 12px; color: #666; }
  .note { font-size: 12px; color: #444; margin-top: 8px; }
</style>
</head>
<body>
<div id="lock-screen">
  <div class="lock-icon">🔒</div>
  <h1>期末复习资料</h1>
  <p>此资料仅供授权学员使用<br>请输入访问密码继续</p>
  <input type="password" id="pwd-input" placeholder="输入密码" autocomplete="off" />
  <div id="error-msg">密码错误，请重试</div>
  <button id="unlock-btn" onclick="unlock()">解锁查看</button>
</div>

<div id="viewer-screen">
  <h2>📚 期末复习资料</h2>
  <p>选择要查看的资料</p>
  <a class="card-link" href="part1.html">
    <div class="card-icon blue">📘</div>
    <div class="card-info">
      <span class="card-title">复习资料一</span>
      <span class="card-sub">163 页</span>
    </div>
  </a>
  <a class="card-link" href="part2.html">
    <div class="card-icon green">📗</div>
    <div class="card-info">
      <span class="card-title">复习资料二</span>
      <span class="card-sub">134 页</span>
    </div>
  </a>
  <span class="note">仅供查看 · 请勿传播</span>
</div>

<script>

const HASH = "4cf457c23b8860794dcb7030d5c2caead4384295be4fbdb1be73867d453c2186";
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
document.getElementById("pwd-input").addEventListener("keydown", e => {
  if (e.key === "Enter") unlock();
});
document.addEventListener("contextmenu", e => e.preventDefault());

async function unlock() {
  const input = document.getElementById("pwd-input");
  const errMsg = document.getElementById("error-msg");
  const hash = await sha256(input.value.trim());
  if (hash === HASH) {
    // 存入 sessionStorage，子页面读取免再次输密码
    sessionStorage.setItem("unlocked", HASH);
    document.getElementById("lock-screen").style.display = "none";
    const v = document.getElementById("viewer-screen");
    v.style.display = "flex";
    document.body.style.flexDirection = "column";
  } else {
    errMsg.style.display = "block";
    input.classList.add("error");
    input.value = "";
    setTimeout(() => input.classList.remove("error"), 400);
  }
}
</script>
</body>
</html>
